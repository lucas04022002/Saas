# Déploiement Render (plan gratuit).
# Le cron quotidien n'est PAS ici : les crons Render sont payants. Il est géré
# gratuitement par GitHub Actions (.github/workflows/daily-analysis.yml), et
# l'anti-veille par .github/workflows/keep-alive.yml.
services:
  - type: web
    name: rushplay-api
    env: python
    plan: free
    rootDir: .
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENV
        value: production
      - key: PREDICTION_PROVIDER
        value: local
      - key: PREDICTION_MODEL_ROOT
        value: /opt/render/project/src
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
