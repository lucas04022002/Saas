name: RushPlay Daily Cron

on:
  schedule:
    # 06:05 UTC ~= 07:05 (hiver Paris) / 08:05 (ete Paris)
    - cron: "5 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Nombre max de matchs a traiter"
        required: false
        default: "50"
      only_missing:
        description: "Traiter uniquement les matchs sans analyse (true/false)"
        required: false
        default: "false"

jobs:
  trigger_daily_run:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          RUSHPLAY_API_BASE_URL: ${{ secrets.RUSHPLAY_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test -n "${RUSHPLAY_API_BASE_URL}"
          test -n "${CRON_SECRET}"

      - name: Call RushPlay daily cron endpoint
        env:
          RUSHPLAY_API_BASE_URL: ${{ secrets.RUSHPLAY_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LIMIT: ${{ github.event.inputs.limit || '50' }}
          ONLY_MISSING: ${{ github.event.inputs.only_missing || 'false' }}
        run: |
          set -euo pipefail

          API_URL="${RUSHPLAY_API_BASE_URL%/}/api/v1/cron/daily-run?limit=${LIMIT}&only_missing=${ONLY_MISSING}"
          echo "Calling: ${API_URL}"

          RESPONSE="$(curl -sS -w '\n%{http_code}' -X POST "${API_URL}" -H "X-CRON-KEY: ${CRON_SECRET}")"
          BODY="$(echo "${RESPONSE}" | sed '$d')"
          STATUS="$(echo "${RESPONSE}" | tail -n1)"

          echo "HTTP status: ${STATUS}"
          echo "Response body: ${BODY}"

          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "Cron call failed"
            exit 1
          fi
